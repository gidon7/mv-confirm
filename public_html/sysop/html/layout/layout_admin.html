<style type="text/css">
/* =====================================================
   Admin Shell Layout — layout_admin.html
   ===================================================== */
html, body {
    height: 100%;
    margin: 0;
    overflow: hidden;
    background: var(--bg-base);
}

#admin-shell {
    display: flex;
    height: 100vh;
}

/* ── 사이드바 ── */
#admin-sidebar {
    width: 250px;
    min-width: 250px;
    height: 100vh;
    background: #1a2535;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
    position: relative;
    z-index: 100;
}

/* 로고 */
#admin-sidebar .sidebar-logo {
    height: 56px;
    display: flex;
    align-items: center;
    padding: 0 18px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    flex-shrink: 0;
}
#admin-sidebar .sidebar-logo a {
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    text-decoration: none;
    letter-spacing: -0.3px;
    display: flex;
    align-items: center;
    gap: 8px;
}
#admin-sidebar .sidebar-logo a i { color: #60a5fa; font-size: 16px; }
#admin-sidebar .sidebar-logo a:hover { text-decoration: none; }

/* 사이드바 본문 (body include 영역) */
#admin-sidebar .sidebar-body {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 0;
}

/* ── 1depth GNB 탭 (top.jsp 전용) ── */
/* admin2.css의 #gnb { height:56px; overflow:hidden } 오버라이드 필수 */
#admin-sidebar #gnb {
    flex-shrink: 0;
    height: auto !important;
    overflow: visible !important;
    border-bottom: 1px solid rgba(255,255,255,0.07);
}
#admin-sidebar #gnb #top_menu {
    margin: 0;
    padding: 6px 8px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    list-style: none;
    height: auto !important;
}
#admin-sidebar #gnb #top_menu li {
    list-style: none;
    height: auto !important;
    border-right: none !important;
}
#admin-sidebar #gnb #top_menu a {
    display: block;
    padding: 8px 12px;
    border-radius: 6px;
    color: rgba(255,255,255,0.6);
    font-size: 13px;
    font-weight: 500;
    text-decoration: none;
    transition: all 0.15s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
#admin-sidebar #gnb #top_menu a:hover {
    background: rgba(255,255,255,0.08);
    color: #fff;
    text-decoration: none;
}
#admin-sidebar #gnb #top_menu a.current {
    background: var(--primary);
    color: #fff;
}
#admin-sidebar #gnb #top_menu a .top_menu_manage {
    font-size: 11px;
    opacity: 0.7;
}

/* ── LNB 아코디언 (공통 — top.jsp / menu2.jsp 양쪽 사용) ── */
#admin-sidebar #lnb_wrapper {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
#admin-sidebar #lnb_shortcut {
    flex-shrink: 0;
    padding: 8px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
}
#admin-sidebar #lnb_shortcut select {
    width: 100%;
    height: 28px;
    font-size: 12px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.75);
    border-radius: 4px;
    padding: 0 6px;
}
#admin-sidebar #lnb_contents_wrapper {
    flex: 1;
    min-height: 0;
    padding-top: 0;
    height: 100%;
    box-sizing: border-box;
    overflow: hidden;
}
#admin-sidebar #lnb_contents {
    height: 100%;
    overflow-y: auto;
}

/* 아코디언 — 다크 테마 오버라이드 */
#admin-sidebar #lnb_contents .acc-nav,
#admin-sidebar #lnb_contents .acc-nav ul,
#admin-sidebar #lnb_contents .acc-nav li { list-style: none; }
#admin-sidebar #lnb_contents .acc-nav { padding: 6px 8px; margin: 0; }

#admin-sidebar #lnb_contents .acc-nav .acc-title {
    border-bottom: none;
    border-radius: 6px;
    margin-bottom: 2px;
    overflow: hidden;
}
#admin-sidebar #lnb_contents .acc-nav .acc-title > a {
    font-size: 13px;
    font-weight: 600;
    line-height: 1.4;
    padding: 9px 12px;
    border-bottom: none;
    color: rgba(255,255,255,0.85) !important;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-radius: 6px;
    transition: background 0.15s;
    text-decoration: none;
}
#admin-sidebar #lnb_contents .acc-nav .acc-title > a i {
    margin-right: 7px;
    width: 16px;
    color: rgba(255,255,255,0.45);
}
#admin-sidebar #lnb_contents .acc-nav .acc-title > a:hover {
    background: rgba(255,255,255,0.08);
    text-decoration: none;
}
#admin-sidebar #lnb_contents .acc-nav .acc-title > a .arrow:before { content: "▾"; font-style: normal; color: rgba(255,255,255,0.35); }
#admin-sidebar #lnb_contents .acc-nav .acc-title.open > a > .arrow:before { content: "▴"; }

#admin-sidebar #lnb_contents .acc-nav .acc-title .acc-sub {
    padding: 2px 0 6px;
    background: transparent;
}
#admin-sidebar #lnb_contents .acc-nav .acc-title .acc-sub a {
    font-size: 12.5px;
    line-height: 1.4;
    margin: 0 4px;
    padding: 6px 8px 6px 30px;
    color: rgba(255,255,255,0.5);
    border-radius: 4px;
    display: block;
    text-decoration: none;
    transition: all 0.12s;
}
#admin-sidebar #lnb_contents .acc-nav .acc-title .acc-sub a:hover {
    color: rgba(255,255,255,0.9);
    background: rgba(255,255,255,0.08);
    text-decoration: none;
}
#admin-sidebar #lnb_contents .acc-nav .acc-title .acc-sub a.active {
    background: var(--primary);
    color: #fff;
}
#admin-sidebar #lnb_contents .acc-nav .acc-title .acc-sub a i {
    width: 14px;
    margin-right: 5px;
    color: rgba(255,255,255,0.35);
}
#admin-sidebar #lnb_contents .nav-desc {
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    font-weight: 400;
}

/* mCustomScrollbar 다크 테마 */
#admin-sidebar .mCustomScrollbar .mCSB_scrollTools .mCSB_dragger .mCSB_dragger_bar { background: rgba(255,255,255,0.2); }
#admin-sidebar .mCustomScrollbar .mCSB_scrollTools .mCSB_draggerRail { background: rgba(255,255,255,0.05); }

/* ── 우측 영역 ── */
#admin-right {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    min-width: 0;
}

/* 탑바 */
#admin-topbar {
    height: 50px;
    background: #fff;
    border-bottom: 1px solid #e2e8f0;
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 10px;
    flex-shrink: 0;
    font-size: 13px;
    color: var(--text-muted);
}
#admin-topbar .topbar-user {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
}
#admin-topbar .topbar-user strong { color: var(--text-base); }
.topbar-btn {
    height: 28px;
    padding: 0 10px;
    border: 1px solid var(--border-dark);
    border-radius: var(--radius-sm);
    background: #fff;
    font-size: 12px;
    color: var(--text-base);
    cursor: pointer;
    font-family: var(--font);
    transition: background 0.12s;
}
.topbar-btn:hover { background: var(--bg-th); }
.topbar-btn.green { background: var(--success); border-color: var(--success); color: #fff; }
.topbar-btn.green:hover { background: #15803d; }

/* 콘텐츠 iframe */
#admin-content {
    flex: 1;
    overflow: hidden;
    position: relative;
}
#admin-content iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
}
</style>
</head>
<body>

<div id="admin-shell">

    <!-- ── 사이드바 ── -->
    <nav id="admin-sidebar">
        <div class="sidebar-logo">
            <a href="javascript:void(0);" onclick="try{document.getElementById('_Main').src='../main/index.jsp';}catch(e){}">
                <i class="fa fa-desktop"></i> 교육통합관리시스템
            </a>
        </div>
        <div class="sidebar-body">
            <!--@include(BODY)-->
        </div>
    </nav>

    <!-- ── 우측 영역 ── -->
    <div id="admin-right">

        <!-- 탑바 -->
        <header id="admin-topbar">
            <span id="admin-page-title"></span>
            <div class="topbar-user">
                <strong>{{user_name}}</strong>님
                <!--@if(super_block)-->
                <button class="topbar-btn green" onclick="window.open('https://help.malgnsoft.com/');">고객센터 <i class="fa fa-angle-right"></i></button>
                <!--/if(super_block)-->
                <button class="topbar-btn" onclick="window.open('/main/index.jsp');">사이트 <i class="fa fa-external-link"></i></button>
                <button class="topbar-btn" onclick="if(confirm('로그아웃하시겠습니까?')) top.location.href='../main/logout.jsp';">로그아웃</button>
            </div>
        </header>

        <!-- 콘텐츠 iframe -->
        <div id="admin-content">
            <iframe name="_Main" id="_Main" src="about:blank" frameborder="0"></iframe>
        </div>

    </div>
</div>

<script type="text/javascript">
var sys_userkind = '{{SYS_USERKIND}}';
var is_auth_crm = {{IS_AUTH_CRM}};

    try { _Main.resizeLayer($("#_Main").width(), $("#_Main").height()); } catch(e) {}

</script>

</body>
</html>
