<style type="text/css">
/* =====================================================
   Admin Shell Layout — layout_admin.html (v3)
   ===================================================== */
html, body { height: 100%; margin: 0; overflow: hidden; background: var(--bg-base); }
#admin-shell { display: flex; height: 100vh; }

/* ── 사이드바 — 딥 다크 ── */
#admin-sidebar {
    width: 260px; min-width: 260px; height: 100vh;
    background: linear-gradient(180deg, #111113 0%, #0a0a0b 100%);
    display: flex; flex-direction: column; overflow: hidden;
    flex-shrink: 0; position: relative; z-index: 100;
}

/* 로고 */
#admin-sidebar .sidebar-logo {
    height: 60px; display: flex; align-items: center;
    padding: 0 20px; border-bottom: 1px solid rgba(255,255,255,0.06); flex-shrink: 0;
}
#admin-sidebar .sidebar-logo a {
    color: #fff; font-size: 15px; font-weight: 700; text-decoration: none;
    letter-spacing: -0.3px; display: flex; align-items: center; gap: 9px;
}
#admin-sidebar .sidebar-logo a i { color: #a78bfa; font-size: 17px; }
#admin-sidebar .sidebar-logo a:hover { text-decoration: none; }

#admin-sidebar .sidebar-body { flex: 1; overflow: hidden; display: flex; flex-direction: column; min-height: 0; }

/* ── 1depth GNB ── */
#admin-sidebar #gnb { flex-shrink: 0; height: auto !important; overflow: visible !important; border-bottom: 1px solid rgba(255,255,255,0.06); }
#admin-sidebar #gnb #top_menu { margin: 0; padding: 8px 10px; display: flex; flex-direction: column; gap: 2px; list-style: none; height: auto !important; }
#admin-sidebar #gnb #top_menu li { list-style: none; height: auto !important; border-right: none !important; }
#admin-sidebar #gnb #top_menu a {
    display: block; padding: 9px 14px; border-radius: 8px;
    color: rgba(255,255,255,0.5); font-size: 13px; font-weight: 500;
    text-decoration: none; transition: all 0.2s;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#admin-sidebar #gnb #top_menu a:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.9); text-decoration: none; }
#admin-sidebar #gnb #top_menu a.current { background: rgba(99,102,241,0.2); color: #a5b4fc; font-weight: 600; }
#admin-sidebar #gnb #top_menu a .top_menu_manage { font-size: 11px; opacity: 0.5; }

/* ── LNB 아코디언 ── */
#admin-sidebar #lnb_wrapper { flex: 1; min-height: 0; display: flex; flex-direction: column; overflow: hidden; }
#admin-sidebar #lnb_shortcut { flex-shrink: 0; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.06); }
#admin-sidebar #lnb_shortcut select {
    width: 100%; height: 30px; font-size: 12px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.6); border-radius: 8px; padding: 0 8px;
}
#admin-sidebar #lnb_contents_wrapper { flex: 1; min-height: 0; padding-top: 0; height: 100%; box-sizing: border-box; overflow: hidden; }
#admin-sidebar #lnb_contents { height: 100%; overflow-y: auto; }

/* 스크롤바 (다크) */
#admin-sidebar #lnb_contents::-webkit-scrollbar { width: 4px; }
#admin-sidebar #lnb_contents::-webkit-scrollbar-track { background: transparent; }
#admin-sidebar #lnb_contents::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }

/* 아코디언 — 다크 오버라이드 */
#admin-sidebar #lnb_contents .acc-nav,
#admin-sidebar #lnb_contents .acc-nav ul,
#admin-sidebar #lnb_contents .acc-nav li { list-style: none; }
#admin-sidebar #lnb_contents .acc-nav { padding: 8px 10px; margin: 0; }

#admin-sidebar #lnb_contents .acc-nav .acc-title { border-bottom: none; border-radius: 8px; margin-bottom: 2px; overflow: hidden; }
#admin-sidebar #lnb_contents .acc-nav .acc-title > a {
    font-size: 12.5px; font-weight: 600; line-height: 1.4; padding: 10px 14px;
    border-bottom: none; color: rgba(255,255,255,0.75) !important;
    display: flex; align-items: center; justify-content: space-between;
    border-radius: 8px; transition: background 0.2s; text-decoration: none;
}
#admin-sidebar #lnb_contents .acc-nav .acc-title > a i { margin-right: 8px; width: 16px; color: rgba(255,255,255,0.3); }
#admin-sidebar #lnb_contents .acc-nav .acc-title > a:hover { background: rgba(255,255,255,0.05); text-decoration: none; }
#admin-sidebar #lnb_contents .acc-nav .acc-title > a .arrow:before { content: "▾"; font-style: normal; color: rgba(255,255,255,0.25); }
#admin-sidebar #lnb_contents .acc-nav .acc-title.open > a > .arrow:before { content: "▴"; }

#admin-sidebar #lnb_contents .acc-nav .acc-title .acc-sub { padding: 2px 0 8px; background: transparent; }
#admin-sidebar #lnb_contents .acc-nav .acc-title .acc-sub a {
    font-size: 12.5px; line-height: 1.4; margin: 1px 6px;
    padding: 7px 10px 7px 32px; color: rgba(255,255,255,0.4);
    border-radius: 6px; display: block; text-decoration: none; transition: all 0.15s;
}
#admin-sidebar #lnb_contents .acc-nav .acc-title .acc-sub a:hover { color: rgba(255,255,255,0.85); background: rgba(255,255,255,0.06); text-decoration: none; }
#admin-sidebar #lnb_contents .acc-nav .acc-title .acc-sub a.active { background: rgba(99,102,241,0.25); color: #c4b5fd; font-weight: 600; }
#admin-sidebar #lnb_contents .acc-nav .acc-title .acc-sub a i { width: 14px; margin-right: 6px; color: rgba(255,255,255,0.25); }
#admin-sidebar #lnb_contents .nav-desc { font-size: 11px; color: rgba(255,255,255,0.2); font-weight: 400; }

/* mCustomScrollbar 다크 */
#admin-sidebar .mCustomScrollbar .mCSB_scrollTools .mCSB_dragger .mCSB_dragger_bar { background: rgba(255,255,255,0.15); }
#admin-sidebar .mCustomScrollbar .mCSB_scrollTools .mCSB_draggerRail { background: rgba(255,255,255,0.03); }

/* ── 우측 영역 ── */
#admin-right { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; min-width: 0; }

/* 탑바 */
#admin-topbar {
    height: 52px; background: #fff; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 24px; gap: 12px;
    flex-shrink: 0; font-size: 13px; color: var(--text-muted);
}
#admin-topbar .topbar-user { margin-left: auto; display: flex; align-items: center; gap: 8px; }
#admin-topbar .topbar-user strong { color: var(--text-base); font-weight: 600; }
.topbar-btn {
    height: 30px; padding: 0 12px;
    border: 1.5px solid var(--border-dark); border-radius: var(--radius-sm);
    background: #fff; font-size: 12px; font-weight: 500;
    color: var(--text-base); cursor: pointer; font-family: var(--font); transition: all 0.15s;
}
.topbar-btn:hover { background: var(--bg-th); box-shadow: var(--shadow-sm); }
.topbar-btn.green { background: var(--success); border-color: var(--success); color: #fff; }
.topbar-btn.green:hover { background: #059669; }

/* 콘텐츠 iframe */
#admin-content { flex: 1; overflow: hidden; position: relative; background: var(--bg-base); }
#admin-content iframe { width: 100%; height: 100%; border: none; display: block; }
</style>
</head>

            </a>
        </div>
        <div class="sidebar-body">
            <!--@include(BODY)-->
        </div>
    </nav>

    <!-- ── 우측 영역 ── -->
    <div id="admin-right">

        <!-- 탑바 -->
        <header id="admin-topbar">
            <span id="admin-page-title"></span>
            <div class="topbar-user">
                <strong>{{user_name}}</strong>님
                <!--@if(super_block)-->
                <button class="topbar-btn green" onclick="window.open('https://help.malgnsoft.com/');">고객센터 <i class="fa fa-angle-right"></i></button>
                <!--/if(super_block)-->
                <button class="topbar-btn" onclick="window.open('/main/index.jsp');">사이트 <i class="fa fa-external-link"></i></button>
                <button class="topbar-btn" onclick="if(confirm('로그아웃하시겠습니까?')) top.location.href='../main/logout.jsp';">로그아웃</button>
            </div>
        </header>

        <!-- 콘텐츠 iframe -->
        <div id="admin-content">
            <iframe name="_Main" id="_Main" src="about:blank" frameborder="0"></iframe>
        </div>

    </div>
</div>
