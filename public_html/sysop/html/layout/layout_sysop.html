<script>
try {
    SetCookie("PREPAGE", document.URL, "", "/");
    HtmlConvertor();
} catch(e) { void e; }

$(window).load(function() {
	$(".l_tr_even, .l_tr_odd, .l_tr_notice").hover(function() {
		$(this).addClass("l_tr_hover");
	}, function() {
		$(this).removeClass("l_tr_hover");
	});

	// 필터 칩 active 상태 초기화 (:has() 미지원 브라우저 대응)
	$(".t_tb01 input[type=radio]:checked, .t_tb01 input[type=checkbox]:checked").closest("label").addClass("chip-active");
	$(document).on("change", ".t_tb01 input[type=radio]", function() {
		$(".t_tb01 input[name='" + this.name + "']").closest("label").removeClass("chip-active");
		if(this.checked) $(this).closest("label").addClass("chip-active");
	});
	$(document).on("change", ".t_tb01 input[type=checkbox]", function() {
		if(this.checked) $(this).closest("label").addClass("chip-active");
		else $(this).closest("label").removeClass("chip-active");
	});

// a_tb01 총 건수 숫자 자동 강조
	$(".a_th01").each(function() {
		$(this).html($(this).html().replace(/(\d[\d,]*)(\s*&nbsp;)/, '<strong>$1</strong>$2'));
	});

	$.fn.select2.defaults.set('language', 'ko');
	$(".js-example-basic-single").select2();
});

var sys_userkind = '{{SYS_USERKIND}}';
var is_auth_crm = {{IS_AUTH_CRM}};

function Toggle() {
	var el = top.document.getElementById("_Main");
	if(!el) return;
	var sidebar = top.document.getElementById("admin-sidebar");
	if(!sidebar) return;
	if(sidebar.style.width === "0px" || sidebar.style.display === "none") {
		sidebar.style.width = "250px";
		document.getElementById("sys-breadcrumb-arrow").innerHTML = "<i class=\"fa fa-angle-left\"></i>";
	} else {
		sidebar.style.width = "0px";
		document.getElementById("sys-breadcrumb-arrow").innerHTML = "<i class=\"fa fa-angle-right\"></i>";
	}
}

function addShortcut() {
	var url = location.href;
	var link = url.substring(url.indexOf("/sysop/"), url.length);
	OpenLayer('../shortcut/pop_shortcut_insert.jsp?type=U&snm=' + escape($("#sys-page-title-nm").html().replace(/(<([^>]+)>)/ig,"")) + '&link=' + escape(link) + '&target=_Main', '_FVIS', 700, 300);
}

</script>
