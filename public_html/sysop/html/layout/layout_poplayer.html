$(document).ready(function() {
	calcHeight();
});
$(window).resize(function() {
	calcHeight();
});
function calcHeight() {
	var frameH = 0;
	try { frameH = $(".pop-frame", parent.document).height(); } catch(e) {}
	if (frameH > 0) {
		$(".pop_content").css("max-height", frameH - 60);
	} else {
		$(".pop_content").css("max-height", $(window).height() - 60);
	}
}

$(window).load(function() {
