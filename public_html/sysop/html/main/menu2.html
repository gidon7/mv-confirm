<!-- layout_blank.html에서 admin2.css, mCustomScrollbar CSS/JS, jQuery를 이미 로드함 (중복 제거) -->

<script type="text/javascript">
var MY_MENU_KEY = "sysop_my_menu";

/* ── localStorage 헬퍼 ── */
function getMyMenu() {
	try { return JSON.parse(localStorage.getItem(MY_MENU_KEY) || "[]"); } catch(e) { return []; }
}
function saveMyMenu(list) {
	localStorage.setItem(MY_MENU_KEY, JSON.stringify(list));
}
function myMenuHas(url) {
	return getMyMenu().some(function(m) { return m.url === url; });
}
function togglePin(nm, url, gnb) {
	var list = getMyMenu();
	var idx = -1;
	for(var i=0; i<list.length; i++) { if(list[i].url === url) { idx = i; break; } }
	if(idx >= 0) list.splice(idx, 1);
	else list.push({ nm: nm, url: url, gnb: gnb });
	saveMyMenu(list);
	renderMyMenuBadge();
	renderMyMenuList();
	// 핀 버튼 상태 갱신
	$("#lnb_contents .acc-sub a").each(function() {
		if($(this).attr("href") === url) {
			$(this).find(".pin-btn").toggleClass("pinned", idx < 0).attr("title", idx < 0 ? "내 메뉴에서 제거" : "내 메뉴에 추가");
		}
	});
}

/* ── 뱃지 ── */
function renderMyMenuBadge() {
	var cnt = getMyMenu().length;
	cnt > 0 ? $("#mm-badge").text(cnt).show() : $("#mm-badge").hide();
}

/* ── 내 메뉴 목록 렌더 ── */
function renderMyMenuList() {
	var list = getMyMenu();
	var $el = $("#my-menu-list");
	if(list.length === 0) {
		$el.html('<div class="mm-empty"><i class="fa fa-star-o"></i><p>메뉴 항목 옆 ★을<br>눌러 추가하세요</p></div>');
		return;
	}
	var html = "";
	list.forEach(function(m) {
		var safeNm  = m.nm.replace(/'/g, "\\'");
		var safeUrl = m.url.replace(/'/g, "\\'");
		var safeGnb = (m.gnb || "").replace(/'/g, "\\'");
		html += '<div class="mm-item" onclick="window.open(\'' + safeUrl + '\',\'_Main\')">'
			  +   '<div class="mm-item-info">'
			  +     '<span class="mm-item-gnb">' + (m.gnb || "") + '</span>'
			  +     '<span class="mm-item-name">' + m.nm + '</span>'
			  +   '</div>'
			  +   '<button class="mm-remove" title="삭제" onclick="event.stopPropagation();togglePin(\'' + safeNm + '\',\'' + safeUrl + '\',\'' + safeGnb + '\')"><i class="fa fa-times"></i></button>'
			  + '</div>';
	});
	$el.html(html);
}

/* ── 모드 전환 ── */
function setMode(mode) {
	if(mode === "all") {
		$("#mm-mode-all").prop("checked", true);
		$("#my-menu-panel").hide();
		$("#lnb_contents").show();
		try { $("#lnb_contents").mCustomScrollbar("update"); } catch(e) {}
	} else {
		$("#mm-mode-my").prop("checked", true);
		$("#lnb_contents").hide();
		$("#my-menu-panel").show();
		renderMyMenuList();
	}
}

/* ── 전체 메뉴 토글 (내 메뉴 모드에서 추가용) ── */
function toggleFullMenu(btn) {
	var $arrow = $(btn).find(".mm-add-arrow");
	var $lnb = $("#lnb_contents");
	if($lnb.is(":visible")) {
		$lnb.slideUp(180);
		$arrow.removeClass("open");
	} else {
		$lnb.slideDown(180);
		$arrow.addClass("open");
		try { $lnb.mCustomScrollbar("update"); } catch(e) {}
	}
}

/* ── 핀 버튼 삽입 ── */
function addPinButtons() {
	var currentGnb = "";
	try { currentGnb = (parent._Top.document.getElementById("top_menu").querySelector("a.current").textContent || "").replace(/관리/g,"").trim(); } catch(e) {}

	$("#lnb_contents .acc-sub a").each(function() {
		var $a = $(this);
		if($a.find(".pin-btn").length) return;
		var nm  = $a.clone().children().remove().end().text().trim();
		var url = $a.attr("href") || "";
		if(!url || url === "#" || url === "javascript:void(0)") return;
		var isPinned = myMenuHas(url);
		var $pin = $('<button class="pin-btn' + (isPinned ? " pinned" : "") + '" title="' + (isPinned ? "내 메뉴에서 제거" : "내 메뉴에 추가") + '"><i class="fa fa-star"></i></button>');
		$pin.on("click", function(e) {
			e.preventDefault(); e.stopPropagation();
			var nowPinned = $(this).hasClass("pinned");
			$(this).toggleClass("pinned");
			$(this).attr("title", nowPinned ? "내 메뉴에 추가" : "내 메뉴에서 제거");
			togglePin(nm, url, currentGnb);
		});
		$a.append($pin);
	});
}

$(document).ready(function() {
	<!--@loop(list)-->
	addAccNode('{{mid}}', '{{list.id}}', '{{list.parent_id}}', '{{list.depth}}', '{{list.name}}', '{{list.link}}', '{{list.target}}', '{{list.open_yn}}', '{{list.icon}}');
	<!--/loop(list)-->

	setAccNav();

	setTimeout(addPinButtons, 60);

	// 기본 모드 결정
	var defaultMode = getMyMenu().length > 0 ? "my" : "all";
	setMode(defaultMode);

	renderMyMenuBadge();

	// 라디오 변경
	$("input[name=mm_mode]").on("change", function() {
		setMode($(this).val());
	});

	// mCustomScrollbar
	$("#lnb_contents").mCustomScrollbar({
		autoHideScrollbar: true,
		theme: "minimal-dark",
		scrollInertia: 0
	});
});

function goShortcut(el) {
	if(!el) return;
	var $option = $("#shortcut-" + el.options[el.selectedIndex].value);
	window.open($option.data("link"), $option.data("target"));
	el.value = "";
}
</script>

<!-- 전체/내 메뉴 모드 라디오 -->
<div class="mm-mode-bar">
	<label class="mm-mode-radio">
		<input type="radio" name="mm_mode" value="all" id="mm-mode-all" checked>
		<span>전체 메뉴</span>
	</label>
	<label class="mm-mode-radio">
		<input type="radio" name="mm_mode" value="my" id="mm-mode-my">
		<span>내 메뉴<span class="mm-badge" id="mm-badge" style="display:none"></span></span>
	</label>
</div>

<div id="lnb_wrapper">
	<div id="lnb_shortcut">
		<select id="favorite_select" onchange="goShortcut(this);">
			<option value="">======== 퀵메뉴 ========</option>
			<option id="shortcut-common-1" value="common-1" data-link="../shortcut/shortcut_list.jsp" data-target="_Main">→ 퀵메뉴관리</option>
			<optgroup label="사이트링크">
			<!--@loop(site_shortcut_list)-->
			<option id="shortcut-site-{{site_shortcut_list.id}}" value="site-{{site_shortcut_list.id}}" data-link="{{site_shortcut_list.link}}" data-target="{{site_shortcut_list.target}}">→ {{site_shortcut_list.shortcut_nm}}</option>
			<!--/loop(site_shortcut_list)-->
			<!--@nif(site_shortcut_list)-->
			<option id="shortcut-site-0" value="site-0" disabled="disabled">(사이트링크가 없습니다.)</option>
			<!--/nif(site_shortcut_list)-->
			</optgroup>
			<optgroup label="개인링크">
			<!--@loop(user_shortcut_list)-->
			<option id="shortcut-user-{{user_shortcut_list.id}}" value="user-{{user_shortcut_list.id}}" data-link="{{user_shortcut_list.link}}" data-target="{{user_shortcut_list.target}}">→ {{user_shortcut_list.shortcut_nm}}</option>
			<!--/loop(user_shortcut_list)-->
			<!--@nif(user_shortcut_list)-->
			<option id="shortcut-user-0" value="user-0" disabled="disabled">(개인링크가 없습니다.)</option>
			<!--/nif(user_shortcut_list)-->
			</optgroup>
		</select>
	</div>

	<div id="lnb_contents_wrapper">

		<!-- 내 메뉴 패널 -->
		<div id="my-menu-panel" style="display:none;">
			<div id="my-menu-list"></div>
			<div class="mm-add-section">
				<button class="mm-add-toggle" onclick="toggleFullMenu(this)">
					<i class="fa fa-th-list"></i> 전체 메뉴에서 추가
					<i class="fa fa-angle-down mm-add-arrow"></i>
				</button>
			</div>
		</div>

		<!-- 전체 메뉴 -->
		<div id="lnb_contents">
			<ul class="acc-nav" id="lnb-{{mid}}" style="width:100%;">
			</ul>
		</div>

	</div>
</div>
