<!-- layout_blank.html에서 CSS/JS를 이미 로드함 -->

<div id="top_contents">
	<div id="logo">
		<a class="txt_logo" href="../main/index.jsp" target="_Main"><i class="fa fa-desktop"></i> 교육통합관리시스템</a>
	</div>
	<div id="gnb">
		<ul id="top_menu">
			<!--@loop(list)-->
			<li><a href="#" onclick="return go(this);" class="{{list.current}}" id="{{list.id}}">{{list.name}}</a></li>
			<!--/loop(list)-->
		</ul>
	</div>
	<div id="utility">
		<div id="buttons">
			<button type="button" class="top_button" onclick="top.location.href='/sysop/main/modern.jsp';" style="background:linear-gradient(135deg,#6366f1,#2563eb); color:#fff; border:none; font-weight:600;"><i class="fa fa-th-large"></i> 모던</button>
			<button type="button" class="top_button blue" onclick="if(confirm('로그아웃하시겠습니까?')) top.location.href='../main/logout.jsp';">{{sysop.logout}}로그아웃</button>
			<!--@if(super_block)--><button type="button" class="top_button green" onclick="window.open('https://help.malgnsoft.com/');">고객센터 <i class="fa fa-angle-right" aria-hidden="true"></i></button><!--/if(super_block)-->
			<button type="button" class="top_button white" onclick="window.open('/main/index.jsp');">{{sysop.sitelink}}사이트 <i class="fa fa-angle-right" aria-hidden="true"></i></button>
			<!--@if(super_malgn_block)-->
			<a href="../alog/alog_list.jsp" target="_Main"><button type="button" class="top_button blue">액션로그</button></a>
			<!--/if(super_malgn_block)-->
		</div>
		<div id="user">
			<strong>{{user_name}}</strong>{{sysop.welcome}}님, 환영합니다.<br>
			<span>
				<a href="javascript:void(0);" onclick="OpenWindows('../main/page.jsp?code=clause', '__C', 1024, 800);" style="color:#efefef;">이용약관</a>
				|
				<a href="javascript:void(0);" onclick="OpenWindows('../main/page.jsp?code=privacy', '__C', 1024, 800);" style="color:#efefef;">개인정보처리방침</a>
			</span>
		</div>
	</div>
</div>

<script>
function go(el, mid, lnb) {
	var menus = document.getElementById("top_menu").getElementsByTagName("a");
	for(var i=0; i<menus.length; i++) { menus[i].className = ""; }

	if(mid) el = document.getElementById(mid);
	if(!el) el = menus[0];
	if(!el) return false;

	SetCookie("mid", el.getAttribute("id"));
	el.className = "current";

	var menuId = el.getAttribute("id");

	// _Menu 프레임에 LNB 로드
	try {
		parent._Menu.location.href = "../main/menu2.jsp?mid=" + menuId + (lnb ? "&lnb=" + lnb : "") + "&t={{now}}";
	} catch(e) {}

	return false;
}

$(document).ready(function() {
	go(null, "{{mid}}", "{{lnb}}");

	$("#top_menu li a").each(function() {
		$(this).html($(this).html().replace("관리", "<span class=\"top_menu_manage\">관리</span>"));
	});
});
</script>
