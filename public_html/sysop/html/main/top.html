<!-- layout_admin.html에서 CSS/JS를 이미 로드함 -->

<!-- 1depth GNB 탭 -->
<div id="gnb">
	<ul id="top_menu">
		<!--@loop(list)-->
		<li><a href="#" onclick="return go(this);" class="{{list.current}}" id="{{list.id}}">{{list.name}}</a></li>
		<!--/loop(list)-->
	</ul>
</div>

<!-- 2-3depth 아코디언 (AJAX로 채워짐) -->
<div id="lnb_wrapper">
	<div id="lnb_contents_wrapper">
		<div id="lnb_contents">
			<ul class="acc-nav" id="lnb-0"></ul>
		</div>
	</div>
</div>

<script>
function go(el, mid, lnb) {
	var menus = document.getElementById("top_menu").getElementsByTagName("a");
	for(var i=0; i<menus.length; i++) { menus[i].className = ""; }

	if(mid) el = document.getElementById(mid);
	if(!el) el = menus[0];
	if(!el) return false;

	SetCookie("mid", el.getAttribute("id"));
	el.className = "current";

	var menuId = el.getAttribute("id");
	$.get("../main/menu2.jsp?mode=json&mid=" + menuId + "&t={{now}}", function(data) {
		var items = JSON.parse(data);
		$(".acc-nav").attr("id", "lnb-" + menuId).html("");
		for(var i = 0; i < items.length; i++) {
			addAccNode(menuId, items[i].id, items[i].parent_id, items[i].depth, items[i].name, items[i].link, items[i].target, items[i].open_yn, items[i].icon);
		}
		setAccNav();
		try { $("#lnb_contents").mCustomScrollbar("update"); } catch(e) {}
	}).fail(function() {
		alert("메뉴를 불러오는 중 오류가 발생했습니다.");
	});

	return false;
}

$(document).ready(function() {
	document.getElementById("_Main").src = "../main/index.jsp";

	$("#lnb_contents").mCustomScrollbar({
		autoHideScrollbar: true,
		theme: "minimal-dark",
		scrollInertia: 0
	});

	go(null, "{{mid}}", "{{lnb}}");

	$("#top_menu li a").each(function() {
		$(this).html($(this).html().replace("관리", "<span class=\"top_menu_manage\">관리</span>"));
	});
});
</script>
