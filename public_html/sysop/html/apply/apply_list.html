<form name="form1" method="get">
    <input type="hidden" name="mode" value="" />
    <input type="hidden" name="ord" value="" />

    <table class="t_tb01" cellpadding="0" cellspacing="0" style="table-layout:fixed">
        <col width="120"><col>
        <col width="120"><col>
        <tr>
            <td class="t_th01">1상태</td>
            <td class="t_td01" colspan="3">
                <label><input type="radio" name="s_status" value="" class="ipt01" checked> 전체 </label> &nbsp;
                <!--@loop(status_list)-->
                <label><input type="radio" name="s_status" value="{{status_list.id}}" class="ipt01"> {{status_list.name}} </label> &nbsp;
                <!--/loop(status_list)-->
            </td>
        </tr>
        <tr>
            <td class="t_th01">검색</td>
            <td class="t_td01" colspan="3">
                <select name="s_field" onchage="document.forms['form1']['s_keyword'].focus();">
                    <option value=""> - 전체 - </option>
                    <option value="apply_nm"> - 신청서명 -</option>
                </select>
                <input type="text" name="s_keyword" size="30" onfocus="this.select();" />
                <button type="submit" class="bttn2">검색</button>
            </td>
        </tr>
    </table>

    <table class="a_tb01" cellpadding="0" cellspacing="0">
        <tr>
            <td class="a_th01">{{list_total}}</td>
            <td class="a_td01">
                <button type="button" class="bttn2 sky" onclick="location.href='apply_insert.jsp?{{list_query}}';">등록</button>
            </td>
        </tr>
    </table>
</form>
{{form_script}}

<form name="form2" method="post" target="sysfrm">
    <table class="l_tb01" cellpadding="0" cellspacing="0" style="table-layout:fixed">
        <colgroup>
            <col width="50">
            <col width="150">
            <col>
            <col width="200">
            <col width="120">
            <col width="100">
            <col width="80">
        </colgroup>
        <thead>
        <tr align="center">
            <td class="l_th01">No</td>
            <td class="l_th01">코드</td>
            <td class="l_th01">신청서명</td>
            <td class="l_th01">신청일</td>
            <td class="l_th01">등록일</td>
            <td class="l_th01">신청자</td>
            <td class="l_th01">상태</td>
        </tr>
        </thead>

        <tbody>
        <!--@loop(list)-->
        <tr align="center" class="l_tr_{{list.ROW_CLASS}}">
            <td class="l_td01">{{list.__ord}}</td>
            <td class="l_td01">{{list.apply_cd}}</td>
            <td class="l_td01 l_td_el" align="left">
                <a href="apply_modify.jsp?id={{list.id}}&{{list_query}}" title="{{list.apply_nm_conv}}">{{list.apply_nm_conv}}</a>
            </td>
            <td class="l_td01">{{list.apply_date_conv}}</td>
            <td class="l_td01">{{list.reg_date_conv}}</td>
            <td class="l_td01"><a href="apply_stat.jsp?id={{list.id}}&{{list_query}}">{{list.apply_user_cnt}} 명</a></td>
            <td class="l_td01"><span class="label">{{list.status_conv}}</span></td>
        </tr>
        <!--/loop(list)-->
        </tbody>
    </table>

    <!--@nif(list)-->
    <table class="n_tb01" cellpadding="0" cellspacing="0">
        <tr>
            <td>해당 내용이 없습니다.</td>
        </tr>
    </table>
    <!--/nif(list)-->

    <table class="p_tb01" cellpadding="0" cellspacing="0">
        <tr>
            <td class="p_td01">{{pagebar}}</td>
        </tr>
    </table>

</form>
<script>
function setLabel() {
    var progresses = { "정상" : "blue", "중지" : "gray" };
    $(".label").each(function() {
        var v = $(this).html();
        $(this).addClass(progresses[v]);
    });
}
addEvent("onload", function() { setLabel(); } );
</script>
