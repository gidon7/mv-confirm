<script>
var count = 2;
function addEtc(){

    var newRow = $(".etc_field").eq(0).clone();
    newRow.find("input[type='text']").val('');
    newRow.find("select").val('text');
    newRow.find("input[type='checkbox']").prop('checked', false);
    $(".etc_fields").append(newRow);

    updateNames();
    count++;
}
function delEtc(v) {
    var etcFields = $(".etc_fields .etc_field");
    if(etcFields.length > 1) {
        $(v).closest('.etc_field').remove();
        updateNames();
    }
}

function updateNames() {
    var etcFields = $(".etc_fields .etc_field");
    etcFields.each(function(index, v) {
        var cntSubject = "etc_subject" + (index + 1);
        var cntType = "etc_type" + (index + 1);
        var cntDefault = "etc_default" + (index + 1);
        $(this).find("input[name^='etc_subject']").attr("name", cntSubject);
        $(this).find("select[name^='etc_type']").attr("name", cntType);
        $(this).find("input[name^='etc_default']").attr("name", cntDefault);
    });
}

<!--@if(modify)-->
$(document).ready(function(){
    var data = {{etc_field}};

    var keys = Object.keys(data);
    var maxIndex = 0;
    keys.forEach(function(key) {
        var match = key.match(/(\d+)$/);
        if (match && parseInt(match[1]) > maxIndex) {
            maxIndex = parseInt(match[1]);
        }
    });

    for (var i = 1; i <= maxIndex; i++) {
        if (i > 1) addEtc();
        $("input[name='etc_subject" + i + "']").val(data["etc_subject" + i]);
        $("select[name='etc_type" + i + "']").val(data["etc_type" + i]);
        $("input[name='etc_default" + i + "']").val(data["etc_default" + i]);
    }
});
<!--/if(modify)-->
</script>
