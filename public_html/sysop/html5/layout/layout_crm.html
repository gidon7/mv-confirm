<style>
html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--content-bg); }

/* CRM Shell */
.crm-shell { display: flex; flex-direction: column; height: 100vh; }

/* CRM Header */
.crm-header {
    height: 52px; flex-shrink: 0;
    background: linear-gradient(135deg, #0c4a6e 0%, #0e7490 100%);
    display: flex; align-items: center;
    padding: 0 16px; gap: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    z-index: 100;
}
.crm-header-logo {
    font-size: 15px; font-weight: 800; color: #fff;
    display: flex; align-items: center; gap: 8px;
    padding-right: 16px; border-right: 1px solid rgba(255,255,255,0.15);
    margin-right: 4px;
}
.crm-header-logo i { color: #67e8f9; }

/* CRM Tabs */
.crm-tabs {
    display: flex; gap: 0; flex: 1; height: 100%;
    list-style: none; margin: 0; padding: 0;
}
.crm-tabs li { height: 100%; }
.crm-tabs a {
    display: inline-flex; align-items: center;
    height: 100%; padding: 0 16px;
    font-size: 13.5px; font-weight: 500;
    color: rgba(255,255,255,0.6);
    text-decoration: none;
    transition: all 0.2s;
    border-bottom: 3px solid transparent;
    white-space: nowrap;
}
.crm-tabs a:hover { color: rgba(255,255,255,0.9); background: rgba(255,255,255,0.06); }
.crm-tabs a.current {
    color: #fff; font-weight: 700;
    border-bottom-color: #67e8f9;
    background: rgba(255,255,255,0.08);
}

.crm-header-right {
    margin-left: auto; display: flex; align-items: center; gap: 8px; flex-shrink: 0;
}

/* CRM Content */
.crm-content { flex: 1; overflow-y: auto; }
.crm-page { padding: 24px 28px; width: 100%; min-width: 900px; }
</style>
</head>
