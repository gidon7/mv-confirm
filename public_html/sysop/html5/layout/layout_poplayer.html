$(function() {
	calcHeight();
	$(window).resize(calcHeight);

	$(".l_tr_even, .l_tr_odd, .l_tr_notice").hover(function() {
		$(this).addClass("l_tr_hover");
	}, function() {
		$(this).removeClass("l_tr_hover");
	});
	$.fn.select2.defaults.set('language', 'ko');
	$(".js-example-basic-single").select2();
});

function calcHeight() {
	var frameH = 0;
	try { frameH = $(".pop-frame", parent.document).height(); } catch(e) {}
	if (frameH > 0) {
		$(".pop_content").css("max-height", frameH - 56);
	} else {
		$(".pop_content").css("max-height", $(window).height() - 56);
	}
}
